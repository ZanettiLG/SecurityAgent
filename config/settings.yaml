# SecurityAgent Configuration

# ── System ──
system:
  mode: "home"  # home | away | night | vacation | business_hours
  log_level: "INFO"
  data_dir: "./data"

# ── Cameras ──
# Use URLs diretas (rtsp://user:pass@ip:554/path) ou variaveis de ambiente
# Para descobrir as cameras na rede: npx tsx scripts/discover-cameras.ts
cameras:
  - id: "externa"
    name: "Intelbras iM7 Full Color (Frente)"
    type: "rtsp"
    source: "rtsp://${CAM1_USER}:${CAM1_PASS}@${CAM1_IP}:${CAM1_PORT}/cam/realmonitor?channel=1&subtype=0"
    transport: "tcp"  # Intelbras funciona com TCP
    enabled: true
    zones:
      - name: "entrance"
        coords: [0, 0, 640, 480]
    processing:
      face_detection: true
      object_detection: true
      motion_detection: true
      frame_skip: 3
  - id: "interna"
    name: "Yoosee (Sala)"
    type: "rtsp"
    source: "rtsp://${CAM2_USER}:${CAM2_PASS}@${CAM2_IP}:${CAM2_PORT}/${CAM2_PATH}"
    transport: "udp"  # Yoosee exige UDP — TCP retorna "Nonmatching transport"
    enabled: true
    zones:
      - name: "living_room"
        coords: [0, 0, 640, 480]
    processing:
      face_detection: true
      object_detection: true
      motion_detection: true
      frame_skip: 3

# ── Audio ──
audio:
  enabled: true
  devices:
    - id: "front_mic"
      source: "rtsp_audio"  # ou "microphone"
      sample_rate: 16000
  processing:
    vad: true
    speaker_recognition: true
    sound_classification: true
    speech_transcription: false  # Privacidade: desabilitado por padrão

# ── Vision ──
vision:
  face_detection:
    model: "yolov8n-face"
    confidence_threshold: 0.5
  face_recognition:
    model: "arcface"
    embedding_dim: 768
    match_threshold_known: 0.75
    match_threshold_frequent: 0.65
  object_detection:
    model: "yolov8n"
    classes_of_interest: ["person", "car", "truck", "backpack", "knife", "gun"]
  motion_detection:
    method: "background_subtraction"
    min_area: 500

# ── Memory ──
memory:
  vector_store:
    type: "chromadb"  # chromadb | qdrant | faiss | memory
    persist_directory: "./data/vectors"
  event_store:
    type: "sqlite"  # sqlite | postgresql
    connection: "data/events.db"
  short_term:
    max_events: 300
    ttl_minutes: 30
  consolidation:
    interval_hours: 1
    llm_summarization: true

# ── GOAP ──
goap:
  enabled: true
  tick_interval_ms: 2000
  max_plan_depth: 10
  max_search_iterations: 2000

# ── LLM ──
llm:
  provider: "ollama"
  model: "minicpm-v4.6"
  api_key: ""
  base_url: "http://localhost:11434"

# ── Actions ──
actions:
  notifications:
    telegram:
      enabled: false
      bot_token: "${TELEGRAM_BOT_TOKEN}"
      chat_id: "${TELEGRAM_CHAT_ID}"
    whatsapp:
      enabled: false
    push:
      enabled: false
    email:
      enabled: false
  smart_home:
    enabled: false
    type: "home_assistant"  # home_assistant | mqtt
    url: "http://localhost:8123"
    token: "${HOME_ASSISTANT_TOKEN}"
  emergency:
    enabled: false
    # Integração com serviços de monitoramento ou chamada automática

# ── Rules ──
rules:
  enabled: true
  # Regras customizadas do usuario
  custom: []

# ── Vigia: Inteligencia de Vizinhanca ──
vigia:
  enabled: true

  # Reconhecimento de veiculos
  vehicles:
    enabled: true
    model: "yolov8n"             # Modelo de deteccao
    parking_baseline_seconds: 300  # Tempo tipico maximo (5 min)
    ask_user_threshold_seconds: 600  # Perguntar apos 10 min
    learn_duration: true          # Aprender duracoes tipicas

  # Aprendizado de rotinas
  routines:
    enabled: true
    learning_rate: 0.05           # Media movel exponencial
    atypical_threshold: 0.15      # Abaixo disso = atipico
    min_observations: 10          # Minimo para baseline confiavel
    profile_ttl_days: 90          # Perfis expiram apos inatividade

  # Mineracao de padroes
  patterns:
    enabled: true
    analysis_window_days: 60      # Janela de analise
    min_sightings: 5              # Minimo de avistamentos
    frequency_comparison: true    # Comparar com categorias

  # Geracao de hipoteses
  hypotheses:
    enabled: true
    auto_generate_threshold: 0.4  # Prob minima para gerar automatico
    ask_user_threshold: 0.5       # Prob minima para perguntar ao usuario
    max_active_hypotheses: 10     # Limite de hipoteses ativas

  # Investigacao social
  social_investigation:
    enabled: false                # Requer autorizacao explicita
    require_authorization: true   # Sempre pedir autorizacao
    sources: ["public_profiles"]  # Fontes permitidas
    max_search_depth: 1           # Quantos graus de conexao investigar

  # Predicao social
  predictions:
    enabled: true
    max_prediction_days: 7        # Horizonte maximo
    default_neighborhood_size: 20 # Tamanho padrao da vizinhanca
    gossip_factors:               # Fatores de "fofoqueirice"
      default: 1.0
      discrete: 0.3
      gossipy: 1.5

  # Perguntas interativas
  queries:
    enabled: true
    max_pending_questions: 5      # Maximo de perguntas pendentes
    question_cooldown_seconds: 300 # Minimo entre perguntas (5 min)
    tone: "informative"           # informative | casual | humoristico
    personality: "friendly"       # professional | friendly | witty
