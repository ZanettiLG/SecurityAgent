version: "3.9"

services:
  # ── SecurityAgent Core ──
  security-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: security-agent
    restart: unless-stopped
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - HOME_ASSISTANT_TOKEN=${HOME_ASSISTANT_TOKEN}
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data
      - ./recordings:/app/recordings
    network_mode: "host"  # Para acessar câmeras RTSP na rede local
    # devices:
    #   - /dev/video0:/dev/video0  # USB camera
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # ── Vector Database (ChromaDB) ──
  chromadb:
    image: chromadb/chroma:latest
    container_name: security-chromadb
    restart: unless-stopped
    volumes:
      - ./data/chromadb:/chroma/chroma
    ports:
      - "8001:8000"

  # ── Redis (Event Bus + Cache) ──
  redis:
    image: redis:7-alpine
    container_name: security-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - ./data/redis:/data

  # ── PostgreSQL (Event Store) ──
  postgres:
    image: postgres:16-alpine
    container_name: security-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: security
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-security_pass}
      POSTGRES_DB: security_agent
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5433:5432"

